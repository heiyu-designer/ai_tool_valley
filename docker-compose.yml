version: '3.8'

services:
  app:
    build: .
    container_name: ${PROJECT_NAME:-ai_tool_valley}-app
    ports:
      - "${PORT:-3876}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/${PROJECT_NAME:-ai_tool_valley}.db
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:${PORT:-3000}}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
    volumes:
      - ./data/${PROJECT_NAME:-ai_tool_valley}:/app/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
